name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Checkout NoJS Core
        uses: actions/checkout@v4
        with:
          repository: ErickXavier/no-js
          path: ../NoJS

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm install --legacy-peer-deps
      - run: npm run build
      - run: npm test
